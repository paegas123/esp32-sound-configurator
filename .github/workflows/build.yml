name: Sestavit aplikaci pro Mac a Windows

# Spustí se automaticky při každém pushnutí do větve "main", nebo si to
# lze spustit i ručně přes záložku "Actions" na GitHubu (tlačítko
# "Run workflow").
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Stáhnout kód
        uses: actions/checkout@v4

      - name: Připravit Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Nainstalovat PyInstaller
        run: pip install pyinstaller certifi

      - name: Vytvořit ikonu pro Mac (.icns z icon_source.png)
        if: runner.os == 'macOS'
        run: |
          mkdir icon.iconset
          sips -z 16 16     icon_source.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     icon_source.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     icon_source.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     icon_source.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   icon_source.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   icon_source.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   icon_source.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   icon_source.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   icon_source.png --out icon.iconset/icon_512x512.png
          cp icon_source.png icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o icon.icns

      - name: Sestavit aplikaci
        run: pyinstaller esp32_sound_configurator.spec

      - name: Zabalit .app do zipu (zachová strukturu složky)
        if: runner.os == 'macOS'
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "ESP32 Sound Configurator.app" "ESP32-Sound-Configurator-Mac.zip"

      - name: Nahrát výsledek (Mac)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ESP32-Sound-Configurator-Mac
          path: dist/ESP32-Sound-Configurator-Mac.zip

      - name: Nahrát výsledek (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ESP32-Sound-Configurator-Windows
          path: dist/ESP32 Sound Configurator.exe
